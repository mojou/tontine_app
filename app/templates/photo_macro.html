{% macro display_photo(member, size=40) %}
    {% if member and member.photo %}
       <img src="{{ url_for('static', filename='images/' + member.photo) }}" 
     class="rounded-circle" 
     width="{{ size }}" 
     height="{{ size }}" 
     style="object-fit: cover;"
     onerror="this.onerror=null; this.src='/static/img/default-avatar.png';">
    {% else %}
        <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center" 
             style="width: {{ size }}px; height: {{ size }}px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <span style="font-size: {{ size//2 }}px; font-weight: bold;">
                {% if member %}
                    {{ member.first_name[0]|upper }}{{ member.last_name[0]|upper }}
                {% else %}
                    ?
                {% endif %}
            </span>
        </div>
    {% endif %}
{% endmacro %}
